<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Trap App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Stock Trap App</h1>
      <p>Politician stock tracker</p>
    </header>

    <section class="search-section">
      <input type="text" id="searchInput" placeholder="Search politician or ticker..." />
    </section>

    <section class="quick-stats">
      <div class="stat-box">
        <span class="stat-label">Most Active Ticker</span>
        <strong id="activeTicker">NVDA</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">Top Politician</span>
        <strong id="topPolitician">Nancy Pelosi</strong>
      </div>
      <div class="stat-box">
        <span class="stat-label">Watchlist</span>
        <strong id="watchCount">4 Tickers</strong>
      </div>
    </section>

    <section class="card">
      <h2>Top 10 Earners</h2>
      <div id="earnersList" class="list"></div>
    </section>

    <section class="card">
      <h2>Trending Political Stocks</h2>
      <div id="stocksList" class="list"></div>
    </section>

    <section class="card">
      <h2>Watchlist</h2>
      <div id="watchlist" class="list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
